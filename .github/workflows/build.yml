name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-24.04
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install --break-system-packages -r requirements.txt
    
    - name: Syntax check
      run: |
        python -m py_compile main.py

  build-linux:
    needs: test
    runs-on: ubuntu-24.04
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    
    - name: Install Linux build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libblkid-dev \
          liblzma-dev \
          ninja-build \
          cmake \
          clang \
          pkg-config
    
    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.4'
        channel: 'stable'
    
    - name: Install dependencies
      run: |
        pip install --break-system-packages -r requirements.txt
        pip install --break-system-packages flet-cli hatchling

    - name: Build Linux
      run: |
        flet build linux --cleanup-packages --exclude watchdog --yes

    - name: Upload Linux build
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: build/linux/

  build-android:
    needs: test
    runs-on: ubuntu-24.04
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.4'
        channel: 'stable'
    
    - name: Install dependencies
      run: |
        pip install --break-system-packages -r requirements.txt
        pip install --break-system-packages flet-cli hatchling
        sudo apt-get update && sudo apt-get install -y cmake ninja-build

    - name: Enable Android
      run: |
        flutter config --enable-linux-desktop
        flutter precache --android

    - name: Accept Android licenses
      run: |
        yes | flutter doctor --android-licenses || true

    - name: Build Android APK
      run: |
        flet build apk --cleanup-packages --exclude watchdog --yes
    
    - name: Upload Android build
      uses: actions/upload-artifact@v4
      with:
        name: android-build
        path: build/apk/
