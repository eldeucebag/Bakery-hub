name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-24.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install --break-system-packages -r requirements.txt
    
    - name: Syntax check
      run: |
        python -m py_compile main.py

  build-linux:
    needs: test
    runs-on: ubuntu-24.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install --break-system-packages -r requirements.txt
        pip install --break-system-packages flet[build]
    
    - name: Build Linux
      run: |
        flet build linux --release
    
    - name: Upload Linux build
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: dist/

  build-android:
    needs: test
    runs-on: ubuntu-24.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install dependencies
      run: |
        pip install --break-system-packages -r requirements.txt
        pip install --break-system-packages flet[build]
    
    - name: Build Android
      run: |
        flet build android --release
    
    - name: Upload Android build
      uses: actions/upload-artifact@v4
      with:
        name: android-build
        path: dist/
